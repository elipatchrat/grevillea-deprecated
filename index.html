<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Grevillea - Student Study Organizer</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // If already logged in and onboarded, redirect to dashboard
        // If logged in but not onboarded, redirect to onboarding
        // Otherwise stay on signup page
        const userData = localStorage.getItem('grevillea_user');
        if (userData) {
            try {
                const user = JSON.parse(userData);
                // Only redirect if user has completed onboarding
                if (user.onboarding === true && user.fullname) {
                    window.location.replace('dashboard.html');
                } else if (user.id && !user.onboarding) {
                    // User exists but hasn't completed onboarding
                    window.location.replace('onboarding.html');
                }
                // Otherwise stay on signup (user object exists but incomplete)
            } catch (e) {
                console.error('Error parsing user data:', e);
                localStorage.removeItem('grevillea_user');
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="signup-card">
            <div class="brand">
                <div class="logo">G</div>
                <h1>Grevillea</h1>
                <p class="tagline">Create your account to get started.</p>
            </div>

            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Create a password (min 8 characters)"
                        minlength="8"
                        required
                    >
                    <span class="error-message" id="password-error"></span>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        placeholder="Confirm your password"
                        required
                    >
                    <span class="error-message" id="confirm-password-error"></span>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    <span class="error-message" id="terms-error"></span>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <!-- Microsoft OAuth - disabled until configured
                <button class="btn-social microsoft">
                    <svg viewBox="0 0 21 21" width="18" height="18">
                        <rect x="1" y="1" width="9" height="9" fill="currentColor"/>
                        <rect x="1" y="11" width="9" height="9" fill="currentColor"/>
                        <rect x="11" y="1" width="9" height="9" fill="currentColor"/>
                        <rect x="11" y="11" width="9" height="9" fill="currentColor"/>
                    </svg>
                    Microsoft
                </button>
                -->
            </div>

            <p class="signin-link">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js?v=7"></script>
    <script src="auth.js?v=7"></script>
    <script src="script.js?v=7"></script>
</body>
</html>
