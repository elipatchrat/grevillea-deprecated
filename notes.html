<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Grevillea</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="auth.css">
    <script>
        const userData = localStorage.getItem('grevillea_user');
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userData);
            if (!user.onboarding) {
                window.location.href = 'onboarding.html';
            }
        }
    </script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo small">G</div>
                <span>Grevillea</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="notes.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    Notes
                </a>
                <a href="timer.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Study Timer
                </a>
                <a href="calendar.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Calendar
                </a>
                <a href="messages.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Messages
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="settings.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Settings
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Notes</h2>
                <div class="top-bar-actions">
                    <button class="btn-icon" title="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                    <button class="btn-icon" title="Notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                    </button>
                    <div class="user-menu">
                        <div class="avatar" id="user-avatar">?</div>
                    </div>
                    <button class="logout-btn" id="logout-btn" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </button>
                </div>
            </header>

            <section class="notes-section">
                <div class="container">
                    <h2 class="section-title">Notes</h2>
                    <div class="notes-layout">
                        <div class="notes-sidebar">
                            <div class="notes-sidebar-header">
                                <h3>My Notes</h3>
                                <button class="btn-add-note" id="btn-add-note">+ New Note</button>
                            </div>
                            <div class="notes-sidebar-list" id="notes-sidebar-list">
                            </div>
                        </div>

                        <div class="notes-editor">
                            <div class="notes-editor-header">
                                <input type="text" class="note-title-input" id="note-title-input" placeholder="Note Title">
                                <div class="note-meta">
                                    <input type="text" class="note-category-input" id="note-category-input" placeholder="Category">
                                    <span class="note-date" id="note-date"></span>
                                </div>
                            </div>
                            <textarea class="note-content" id="note-content" placeholder="Start writing your note here..."></textarea>
                            <div class="notes-editor-footer">
                                <button class="btn-save-note" id="btn-save-note">Save Note</button>
                                <button class="btn-delete-note" id="btn-delete-note">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script src="supabase-config.js?v=7"></script>
        <script src="auth.js?v=7"></script>
        <script src="dashboard.js?v=7"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async function() {
                const supabase = getSupabase();
                if (supabase) {
                    const { data: { session }, error } = await supabase.auth.getSession();
                    if (session?.user) {
                        const user = getUser();
                        if (!user || user.id !== session.user.id) {
                            setUser({
                                id: session.user.id,
                                email: session.user.email,
                                fullname: session.user.user_metadata?.fullname || session.user.email.split('@')[0]
                            });
                        }
                    } else if (!isAuthenticated()) {
                        window.location.href = 'login.html';
                        return;
                    }
                }
                updateUIForUser();
                document.getElementById('logout-btn')?.addEventListener('click', async function() {
                    if (confirm('Are you sure you want to logout?')) {
                        await logout();
                    }
                });
            });
        </script>
    </script>
</body>
</html>
