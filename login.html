<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Grevillea</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="brand">
                <div class="logo">G</div>
                <h1>Grevillea</h1>
                <p class="tagline">Sign in to organize your studies and achieve your goals.</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="error-message" id="password-error"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="divider">
                <span>or sign in with</span>
            </div>

            <div class="social-login">
                <button class="btn-social google" id="google-signin">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <!-- Microsoft OAuth - disabled until configured
                <button class="btn-social microsoft" id="microsoft-signin">
                    <svg viewBox="0 0 21 21" width="18" height="18">
                        <rect x="1" y="1" width="9" height="9" fill="currentColor"/>
                        <rect x="1" y="11" width="9" height="9" fill="currentColor"/>
                        <rect x="11" y="1" width="9" height="9" fill="currentColor"/>
                        <rect x="11" y="11" width="9" height="9" fill="currentColor"/>
                    </svg>
                    Microsoft
                </button>
                -->
            </div>

            <p class="auth-link">Don't have an account? <a href="index.html">Sign up</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js?v=5"></script>
    <script src="auth.js?v=5"></script>
    <script src="login.js?v=5"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2205903321676955"
     crossorigin="anonymous"></script>
</body>
</html>
